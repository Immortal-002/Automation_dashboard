version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "9090:9090"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./worker
    depends_on:
      - postgres
      - redis
